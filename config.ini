# speed-intranet — Fichier de configuration
# ============================================================
# Ce fichier est utilisé par la commande :
#   python speedtest.py auto --config config.ini
#
# La machine principale (Terminal 1) exécute :
#   python speedtest.py auto --config config.ini
#
# Chaque machine secondaire (terminal annexe) exécute :
#   python speedtest.py server
# ============================================================

[network]
# Port TCP utilisé pour les transferts (même valeur sur toutes les machines)
port = 5201

# Timeout socket en secondes (connexion, envoi, réception)
timeout = 10

# Adresses IP des terminaux annexes à tester
# (chacun doit tourner en mode "server")
# Séparer les adresses par des virgules.
terminals = 192.168.1.2, 192.168.1.3

[tests]
# Types de tests à effectuer :
#   small   → 200 fichiers de 1 Kio  (mesure le débit pour beaucoup de petits fichiers)
#   medium  → 1 fichier de 20 Mio
#   large   → 1 fichier de 300 Mio
#   all     → les trois tests ci-dessus
# Vous pouvez combiner : small,medium
test_types = all

# Direction des tests :
#   upload   → uniquement Terminal 1 → terminal annexe
#   download → uniquement terminal annexe → Terminal 1
#   both     → les deux sens (recommandé)
direction = both

# Nombre de passages complets de la batterie de tests
# (utile pour obtenir min / moyenne / max)
repeat = 1
